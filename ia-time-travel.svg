<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="url(#glow)" stroke-width="3"/>
  <!-- Clock circle -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
  <circle cx="64" cy="64" r="42" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <!-- Clock marks -->
  <line x1="64" y1="26" x2="64" y2="32" stroke="#00f0ff" stroke-width="2"/>
  <line x1="64" y1="96" x2="64" y2="102" stroke="#00f0ff" stroke-width="2"/>
  <line x1="26" y1="64" x2="32" y2="64" stroke="#00f0ff" stroke-width="2"/>
  <line x1="96" y1="64" x2="102" y2="64" stroke="#00f0ff" stroke-width="2"/>
  <!-- Clock hands -->
  <line x1="64" y1="64" x2="64" y2="38" stroke="#00f0ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="82" y2="52" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="#00f0ff"/>
  <!-- AI Brain symbol -->
  <text x="64" y="85" font-family="sans-serif" font-size="14" font-weight="bold" fill="#00f0ff" text-anchor="middle" opacity="0.9">AI</text>
  <!-- Orbit rings -->
  <ellipse cx="64" cy="64" rx="52" ry="18" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4" transform="rotate(-30 64 64)"/>
  <ellipse cx="64" cy="64" rx="52" ry="18" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" transform="rotate(30 64 64)"/>
</svg>
