# Reverse proxy nginx pour IA Time Traveler.
# ${DOMAIN_NAME} est substitue au demarrage du conteneur via envsubst.

# Headers proxy communs aux upstreams backend / frontend.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_http_version 1.1;

# Redirection HTTP -> HTTPS + challenges ACME (Let's Encrypt).
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN_NAME};

    # Challenges ACME pour certbot : servir les fichiers en clair.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste est redirige en HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal : reverse-proxy vers backend Django + frontend statique.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN_NAME};

    # Certificats Let's Encrypt (montes en RO depuis ./deploy/certbot/conf).
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # En-tetes de securite.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # Taille max des requetes (upload d'images, etc.).
    client_max_body_size 10M;

    # Gzip.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # API Django.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_read_timeout 60s;
    }

    # Admin Django.
    location /admin/ {
        proxy_pass http://backend:8000;
    }

    # Fichiers statiques Django collectes.
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (nginx statique construit par frontend/Dockerfile.prod).
    location / {
        proxy_pass http://frontend:80;
    }
}
